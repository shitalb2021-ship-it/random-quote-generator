<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator - Biro Ka App</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',sans-serif;
            background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px
        }
       .container{
            max-width:700px;
            width:100%;
            background:white;
            border-radius:25px;
            padding:50px 40px;
            box-shadow:0 25px 70px rgba(0,0,0,0.3);
            text-align:center
        }
        h1{
            color:#f5576c;
            margin-bottom:30px;
            font-size:2.2rem
        }
       .quote-box{
            min-height:200px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            margin:30px 0
        }
       .quote-text{
            font-size:1.6rem;
            color:#333;
            line-height:1.6;
            margin-bottom:20px;
            font-style:italic
        }
       .quote-author{
            font-size:1.2rem;
            color:#f5576c;
            font-weight:600
        }
       .quote-author:before{content:"— "}
        button{
            background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);
            color:white;
            border:none;
            padding:18px 45px;
            border-radius:50px;
            font-size:1.1rem;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 8px 20px rgba(245,87,108,0.4);
            transition:all 0.3s;
            margin-top:20px
        }
        button:hover{
            transform:translateY(-3px);
            box-shadow:0 12px 25px rgba(245,87,108,0.5)
        }
        button:active{transform:translateY(0)}
       .footer{
            margin-top:40px;
            color:#999;
            font-size:0.9rem
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>? Random Quote Generator</h1>
        <div class="quote-box">
            <div class="quote-text" id="quoteText">Click the button to get inspired!</div>
            <div class="quote-author" id="quoteAuthor">Biro</div>
        </div>
        <button onclick="newQuote()">New Quote ??</button>
        <div class="footer">Made with ?? by Biro | Task 2 - June Batch</div>
    </div>

    <script>
        const quotes = [
            {text:"The only way to do great work is to love what you do.",author:"Steve Jobs"},
            {text:"Believe you can and you're halfway there.",author:"Theodore Roosevelt"},
            {text:"Success is not final, failure is not fatal: it is the courage to continue that counts.",author:"Winston Churchill"},
            {text:"Your time is limited, don't waste it living someone else's life.",author:"Steve Jobs"},
            {text:"The future belongs to those who believe in the beauty of their dreams.",author:"Eleanor Roosevelt"},
            {text:"It does not matter how slowly you go as long as you do not stop.",author:"Confucius"},
            {text:"Everything you've ever wanted is on the other side of fear.",author:"George Addair"},
            {text:"Hard work beats talent when talent doesn't work hard.",author:"Tim Notke"},
            {text:"Dream big and dare to fail.",author:"Norman Vaughan"},
            {text:"What we think, we become.",author:"Buddha"},
            {text:"Tu akeli nahi hai. Tu sherni hai.",author:"Biro"},
            {text:"Code karo, sapne sach karo.",author:"Biro"}
        ];

        function newQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            const quote = quotes[randomIndex];
            document.getElementById('quoteText').textContent = `"${quote.text}"`;
            document.getElementById('quoteAuthor').textContent = quote.author;
        }

        // Load first quote on page open
        newQuote();
    </script>
</body>
</html>
